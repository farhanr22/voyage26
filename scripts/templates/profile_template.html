<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="/js/qr-code-styling.js"></script>
    <title>Voyage 2k25</title>
    <link rel="shortcut icon" href="images/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            --col: var(--hero-text);
            transition: 0.3s ease-in all;
        }

        .loader {
            width: 17px;
            aspect-ratio: 1;
            border-radius: 50%;
            background: hsl(210, 35%, 46%);
            display: grid;
            animation: l22-0 2s infinite linear;
        }

        .loader:before,
        .loader:after {
            content: "";
            grid-area: 1/1;
            margin: 15%;
            border-radius: 50%;
            background: inherit;
            transform: rotate(0deg) translate(150%);
            animation: l22 1s infinite;
        }

        .loader:after {
            animation-delay: -.5s
        }

        @keyframes l22-0 {
            100% {
                transform: rotate(1turn)
            }
        }

        @keyframes l22 {
            100% {
                transform: rotate(1turn) translate(150%)
            }
        }
    </style>
</head>

<body>
    <div id="preloader">
        <div class="loader"></div>
    </div>

    <h1>
        Voyage 2k25
    </h1>
    <h2>Attendee Profile</h2>

    <div class="layout">

        <div class="qrbox">
            <div id="canvas"></div>
        </div>

        <div class="itembox">
            <div class="item">
                <div class="emoji">
                    <img src="/images/user.svg" alt="">
                </div>
                <div class="content">
                    <div class="desc">
                        NAME
                    </div>
                    <div class="value">
                        {{data.name}}
                    </div>
                </div>
            </div>
            <div class="item">
                <div class="emoji">
                    <img src="/images/stream.svg" alt="">
                </div>
                <div class="content">
                    <div class="desc">
                        BATCH
                    </div>
                    <div class="value">
                        {{data.batch}}
                    </div>
                </div>
            </div>
            <div class="item">
                <div class="emoji">
                    <img src="/images/food.svg" alt="">
                </div>
                <div class="content">
                    <div class="desc">
                        FOOD PREFERENCE
                    </div>
                    <div class="value">
                        {{data.food}}
                    </div>
                </div>
            </div>
            <div class="item">
                <div class="emoji">
                    <img src="/images/tshirt.svg" alt="">
                </div>
                <div class="content">
                    <div class="desc">
                        TSHIRT
                    </div>
                    <div class="value">
                        {{data.tshirt}}
                    </div>
                </div>
            </div>
            <div class="item">
                <div class="emoji">
                    <img src="/images/box.svg" alt="">
                </div>
                <div class="content">
                    <div class="desc">
                        ITEMS RECEIVED
                    </div>
                    <div class="value">
                        {{data.items_rec}}
                    </div>
                </div>
            </div>
            <div class="item {% if data.paid < data.payable %} yellow {% else %} green {% endif %}">
                <div class="emoji">
                    <img src="/images/coins.svg" alt="">
                </div>
                <div class="content">
                    <div class="desc">
                        CONTRIBUTION
                    </div>
                    <div class="value">
                        &#8377; {{data.paid}} / {{data.payable}}
                    </div>
                </div>
            </div>

        </div>
    </div>

    <br><br>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.fonts.ready.then(function () {
                preloader.style.opacity = '0';

                setTimeout(function () {
                    preloader.style.display = 'none';
                }, 300);

                const qrCode = new QRCodeStyling({
                    type: "canvas",
                    data: "{{data.id}}",
                    image: "/images/icon.png",
                    dotsOptions: {
                        color: "#4c759e",
                        type: "classy"
                    },
                    cornersSquareOptions: {
                        type: "square"
                    },
                    cornersDotOptions: {
                        type: "square"
                    },
                    qrOptions: {
                        mode: "Alphanumeric",
                    },
                    backgroundOptions: {
                        color: "transparent",
                    },
                    imageOptions: {
                        crossOrigin: "anonymous",
                        margin: 10
                    }
                });

                qrCode.append(document.getElementById("canvas"));
            });
        });



    </script>
</body>

</html>
